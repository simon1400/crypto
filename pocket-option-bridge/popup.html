<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 320px; padding: 12px; font-family: system-ui, sans-serif; background: #0b0e11; color: #eaecef; margin: 0; }
  h2 { margin: 0 0 12px 0; font-size: 14px; color: #f0b90b; }
  label { display: block; font-size: 11px; color: #848e9c; margin-bottom: 4px; margin-top: 8px; }
  input { width: 100%; box-sizing: border-box; padding: 6px 8px; background: #1e2329; border: 1px solid #2b3139; color: #eaecef; border-radius: 4px; font-size: 12px; font-family: monospace; }
  button { width: 100%; margin-top: 12px; padding: 8px; background: #f0b90b; color: #0b0e11; border: 0; border-radius: 4px; font-weight: 600; cursor: pointer; }
  button:hover { background: #d4a309; }
  .stats { margin-top: 12px; padding: 8px; background: #1e2329; border-radius: 4px; font-size: 11px; font-family: monospace; }
  .stat-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .stat-label { color: #848e9c; }
  .stat-val { color: #eaecef; }
  .ok { color: #0ecb81; }
  .err { color: #f6465d; }
</style>
</head>
<body>
<h2>Pocket Option Bridge</h2>
<label>Backend URL</label>
<input id="backendUrl" placeholder="http://localhost:3020">
<label>API Secret (X-Api-Secret)</label>
<input id="apiSecret" type="password" placeholder="...">
<button id="save">Сохранить</button>

<div class="stats" id="statsBox">
  <div class="stat-row"><span class="stat-label">Получено тиков</span><span class="stat-val" id="totalReceived">—</span></div>
  <div class="stat-row"><span class="stat-label">Отправлено</span><span class="stat-val" id="totalSent">—</span></div>
  <div class="stat-row"><span class="stat-label">Буфер</span><span class="stat-val" id="bufferSize">—</span></div>
  <div class="stat-row"><span class="stat-label">Ошибок</span><span class="stat-val" id="totalErrors">—</span></div>
  <div class="stat-row"><span class="stat-label">Статус</span><span class="stat-val" id="status">—</span></div>
</div>

<script src="popup.js"></script>
</body>
</html>
